services:
  bot:
    build: .
    container_name: telegram-audio-bot
    init: true
    env_file:
      - path: .env
        required: false
    ports:
      - "8086:8080"
    environment:
      - WEB_HOST=0.0.0.0
      - WEB_PORT=8080
    volumes:
      - ./audio_files:/app/audio_files
    restart: always
    security_opt:
      - no-new-privileges:true
