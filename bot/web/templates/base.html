<!DOCTYPE html>
<html lang="it" data-theme="dark">
<script>
  (function(){var t=localStorage.getItem('theme');if(t)document.documentElement.dataset.theme=t;})();
</script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Bot{% block title %}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="navbar">
        <div class="container">
            <a href="/" class="navbar-brand">Audio Bot</a>
            <nav class="navbar-nav">
                {% if session and session.get("admin") %}
                <a href="/admin/dashboard"{% if request.url.path == '/admin/dashboard' %} class="active"{% endif %}>Dashboard</a>
                <a href="/admin/providers"{% if request.url.path.startswith('/admin/providers') %} class="active"{% endif %}>Provider</a>
                <a href="/admin/pipeline"{% if request.url.path == '/admin/pipeline' %} class="active"{% endif %}>Pipeline</a>
                <button type="button" class="btn-link" id="theme-toggle" aria-label="Cambia tema"></button>
                <form action="/logout" method="post" class="inline-form">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <button type="submit" class="btn-link">Logout</button>
                </form>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>Telegram Audio Bot &mdash; Trascrizione audio automatica</p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
    <script>
    (function(){
        var btn = document.getElementById('theme-toggle');
        if (!btn) return;
        function update(theme) {
            document.documentElement.dataset.theme = theme;
            btn.textContent = theme === 'dark' ? '☀️' : '🌙';
            btn.title = theme === 'dark' ? 'Passa alla light mode' : 'Passa alla dark mode';
        }
        update(document.documentElement.dataset.theme || 'dark');
        btn.addEventListener('click', function(){
            var next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', next);
            update(next);
        });
    })();
    </script>
</body>
</html>
