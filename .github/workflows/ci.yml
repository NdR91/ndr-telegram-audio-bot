name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Check Python sources and imports
        run: |
          find bot tests -type f -name '*.py' ! -name '._*' -print0 | xargs -0 python -m py_compile
          python -c "import pkgutil, bot; [__import__(module.name) for module in pkgutil.walk_packages(bot.__path__, bot.__name__ + '.')]"

      - name: Run tests
        run: python -m pytest tests
